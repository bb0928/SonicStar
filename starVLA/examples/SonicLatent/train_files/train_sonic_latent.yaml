run_id: sonic_latent_scratch_frozen_vlm
run_root_dir: playground/Checkpoints
seed: 42
trackers: [jsonl, wandb]
wandb_entity: ''
wandb_project: starvla_sonic_latent
is_debug: false

framework:
  name: QwenGR00T
  qwenvl:
    # Load the base VLM only; do not restore a GR00T task checkpoint.
    base_vlm: ./playground/Pretrained_models/Qwen3-VL-4B-Instruct-Action
    attn_implementation: flash_attention_2
    vl_hidden_dim: 2048
  action_model:
    action_model_type: DiT-B
    hidden_size: 1024
    add_pos_embed: true
    max_seq_len: 1024
    action_dim: 78
    state_dim: 46
    future_action_window_size: 39
    action_horizon: 40
    past_action_window_size: 0
    repeated_diffusion_steps: 2
    noise_beta_alpha: 1.5
    noise_beta_beta: 1.0
    noise_s: 0.999
    num_timestep_buckets: 1000
    num_inference_timesteps: 4
    num_target_vision_tokens: 32
    diffusion_model_cfg:
      cross_attention_dim: 2048
      dropout: 0.2
      final_dropout: true
      interleave_self_attention: true
      norm_type: ada_norm
      num_layers: 16
      output_dim: 1024
      positional_embeddings: null
  obs_image_size: [224, 224]

datasets:
  vla_data:
    # Inputs: ego_view + observation.state(43) + projected_gravity(3) + language
    # Outputs: motion_token(64) + left_hand_joints(7) + right_hand_joints(7)
    dataset_py: lerobot_datasets
    data_root_dir: /home/user/LM/VLA/starVLA/playground/Datasets
    data_mix: sonic_merged_dataset_001
    include_state: true
    per_device_batch_size: 4
    load_all_data_for_training: true
    default_image_resolution: [3, 224, 224]
    video_backend: torchvision_av

trainer:
  epochs: 100
  max_train_steps: 90000
  num_warmup_steps: 100
  save_interval: 30000
  eval_interval: 100
  learning_rate:
    base: 1.0e-04
    qwen_vl_interface: 0.0
    action_model: 1.0e-04
  lr_scheduler_type: cosine_with_min_lr
  scheduler_specific_kwargs:
    min_lr: 5.0e-07
  freeze_modules: 'qwen_vl_interface'
  loss_scale:
    vla: 1.0
  max_grad_norm: 1.0
  warmup_ratio: 0.0
  weight_decay: 0.0
  logging_frequency: 10
  gradient_clipping: 1.0
  gradient_accumulation_steps: 1
  gradient_checkpointing: true

  optimizer:
    name: Adafactor
    beta1: 0.9
    eps: 1.0e-08
    weight_decay: 1.0e-08
    clip_threshold_eps: 1.0e-03
    clip_threshold: 1.0
    decay_rate: -0.8
    scale_parameter: false
    relative_step: false
    warmup_init: false

  # Start from scratch for the GR00T action head.
  # qwen_vl_interface is frozen above, so only the randomly initialized action head trains.
  pretrained_checkpoint: null
  reload_modules: null
  is_resume: false
  resume_epoch: null
  resume_step: null
  enable_gradient_checkpointing: true
  enable_mixed_precision_training: true
